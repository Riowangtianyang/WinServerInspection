            {{#execute_http.body#}}


            统一命令规划结果：

            {{#normalize_review_gate.planner_text#}}


            命令库：

            {{#env.COMMAND_LIBRARY_JSON#}}


            预计算统计信息：

            - 总命令数：{{#normalize_review_gate.total_command_count#}}

            - 标准命令库命令数：{{#normalize_review_gate.library_command_count#}}

            - 自动生成命令数：{{#normalize_review_gate.generated_command_count#}}

            - 自动生成命令列表：{{#normalize_review_gate.generated_command_list#}}

            - 来源异常命令：{{#normalize_review_gate.unknown_source_command_list#}}

            - 完整性结论：{{#normalize_review_gate.integrity_summary#}}


            请严格按下面格式输出，不要输出 JSON，不要输出原始命令代码全文，不要输出英文状态原值。


            一、机器信息摘要

            连接状态：...

            主机角色：...

            操作系统：...

            当前账户：...

            管理员权限：...

            当前时间：...

            AD 域：...


            二、详细巡检结果

            执行统计：

            - 总命令数：...

            - 总成功数：...

            - 总失败数：...

            - 标准命令库命令成功数：...

            - 标准命令库命令失败数：...

            - 自动生成命令成功数：...

            - 自动生成命令失败数：...


            关键结论：

            - ...

            - ...


            失败项：

            - ...

            - ...


            三、逐条命令详情

            请按执行顺序输出每条命令的详细信息，格式固定如下：


            1. ...

            命令：

            解释：

            PowerShell输出：

            风险等级：

            解决办法与优化建议：


            规则：

            - 只能根据输入内容输出，不允许编造

            - 如果某项没有获取到，明确写“未获取到”

            - 如果执行接口 HTTP 状态码不是 2xx，或者 execute 返回无法解析，明确写“连接或执行失败”

            - 优先从 host_domain_role_probe、host_os_probe、host_identity_probe、host_time_probe
            中提取机器信息

            - 成功与失败以 return_code 是否等于 0 判断

            - “标准命令库命令”对应 source=library

            - “自动生成命令”对应 source=generated

            - 风险等级输出为中文：低 / 中 / 高

            - 逐条命令详情必须优先结合命令库中的 title、purpose、risk_level；若命令库里没有，再根据 execute 返回做保守总结

            - PowerShell输出只保留关键结果；过长时做摘要，不要整段照抄

            - 解决办法与优化建议必须结合该命令执行结果来写：失败项给修复建议，成功项给观察建议

            - 全程中文，格式清晰，简洁专业，让非技术人员也能看懂'
