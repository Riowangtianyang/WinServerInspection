        code: "import json\n\ndef _pick_planner_text(full_planner_text: str, partial_planner_text:\
          \ str):\n    full_text = (full_planner_text or '').strip()\n    partial_text\
          \ = (partial_planner_text or '').strip()\n    return full_text or partial_text\n\
          \ndef _load_payload(planner_text: str):\n    text = (planner_text or '').strip()\n\
          \    if not text:\n        raise ValueError('planner returned empty text')\n\
          \    if '```' in text:\n        parts = [part.strip() for part in text.split('```')\
          \ if part.strip()]\n        for part in parts:\n            if part.startswith('json'):\n\
          \                text = part[4:].strip()\n                break\n    start\
          \ = text.find('{')\n    end = text.rfind('}')\n    if start != -1 and end\
          \ != -1 and end >= start:\n        text = text[start:end + 1]\n    return\
          \ json.loads(text)\n\ndef _build_command_lookup(command_library_json: str):\n\
          \    raw = (command_library_json or '').strip()\n    if not raw:\n     \
          \   return {}\n    library = json.loads(raw)\n    commands = library.get('commands')\
          \ if isinstance(library, dict) else []\n    if not isinstance(commands,\
          \ list):\n        return {}\n    lookup = {}\n    for item in commands:\n\
          \        if not isinstance(item, dict):\n            continue\n        command_id\
          \ = str(item.get('id') or '').strip()\n        shell = str(item.get('shell')\
          \ or item.get('command') or '').strip()\n        if command_id and shell:\n\
          \            lookup[command_id] = shell\n    return lookup\n\ndef main(full_planner_text:\
          \ str, partial_planner_text: str, command_library_json: str, machine_ip:\
          \ str):\n    planner_text = _pick_planner_text(full_planner_text, partial_planner_text)\n\
          \    payload = _load_payload(planner_text)\n    commands = payload.get('commands')\n\
          \    if not isinstance(commands, list) or not commands:\n        raise ValueError('planner\
          \ commands missing')\n    command_lookup = _build_command_lookup(command_library_json)\n\
          \    normalized = []\n    for index, item in enumerate(commands, start=1):\n\
          \        if isinstance(item, dict):\n            command_id = str(item.get('id')\
          \ or f'cmd_{index}').strip()\n            shell = str(item.get('shell')\
          \ or item.get('command') or '').strip()\n            if not shell:\n   \
          \             shell = str(command_lookup.get(command_id) or '').strip()\n\
          \        else:\n            command_id = f'cmd_{index}'\n            shell\
          \ = str(item).strip()\n        if not shell:\n            raise ValueError(f'command\
          \ shell missing: {command_id}')\n        normalized.append({'id': command_id,\
          \ 'shell': shell})\n    task_id = str(payload.get('task_id') or '').strip()\
          \ or 'wf-unknown'\n    target_host = (machine_ip or '').strip() or str(payload.get('target_host')\
          \ or '').strip() or '10.0.18.212'\n    body_payload = {'task_id': task_id,\
          \ 'target_host': target_host, 'commands': normalized}\n    return {'body':\
          \ json.dumps(body_payload, ensure_ascii=False)}"
