        code: "import json\n\ndef _choose_text(*candidates):\n    for item in candidates:\n\
          \        text = (item or '').strip()\n        if text:\n            return\
          \ text\n    return ''\n\ndef _extract_json(text: str):\n    raw = (text\
          \ or '').strip()\n    if not raw:\n        return {}\n    fence = chr(96)\
          \ * 3\n    if fence in raw:\n        parts = [part.strip() for part in raw.split(fence)\
          \ if part.strip()]\n        for part in parts:\n            if part.startswith('json'):\n\
          \                raw = part[4:].strip()\n                break\n    start\
          \ = raw.find('{')\n    end = raw.rfind('}')\n    if start != -1 and end\
          \ != -1 and end >= start:\n        raw = raw[start:end + 1]\n    return\
          \ json.loads(raw)\n\ndef _load_command_library(command_library_json: str):\n\
          \    raw = (command_library_json or '').strip()\n    if not raw:\n     \
          \   return 'unknown', []\n    library = json.loads(raw)\n    version = str(library.get('version')\
          \ or '').strip() or 'unknown'\n    commands = library.get('commands') if\
          \ isinstance(library, dict) else []\n    normalized = []\n    if isinstance(commands,\
          \ list):\n        for item in commands:\n            if not isinstance(item,\
          \ dict):\n                continue\n            command_id = str(item.get('id')\
          \ or '').strip()\n            shell = str(item.get('shell') or item.get('command')\
          \ or '').strip()\n            if command_id and shell:\n               \
          \ normalized.append({'id': command_id, 'shell': shell})\n    return version,\
          \ normalized\n\ndef _normalize_commands(commands):\n    normalized = []\n\
          \    if not isinstance(commands, list):\n        return normalized\n   \
          \ for index, item in enumerate(commands, start=1):\n        if isinstance(item,\
          \ dict):\n            command_id = str(item.get('id') or f'cmd_{index}').strip()\n\
          \            shell = str(item.get('shell') or item.get('command') or '').strip()\n\
          \            source = str(item.get('source') or '').strip().lower()\n  \
          \      else:\n            command_id = f'cmd_{index}'\n            shell\
          \ = str(item).strip()\n            source = ''\n        if source not in\
          \ {'library', 'generated'}:\n            source = 'unknown'\n        normalized.append({'id':\
          \ command_id, 'shell': shell, 'source': source})\n    return normalized\n\
          \ndef _join_or_none(values):\n    items = [str(item).strip() for item in\
          \ values if str(item).strip()]\n    return '、'.join(items) if items else\
          \ '无'\n\ndef _build_integrity_summary(plan_mode, expected_library_ids, actual_library_ids,\
          \ generated_ids, unknown_source_ids):\n    if plan_mode != 'full_inspection':\n\
          \        return '当前为非全量检查，不适用全量完整性校验。'\n    missing_ids = [cid for cid in\
          \ expected_library_ids if cid not in actual_library_ids]\n    issues = []\n\
          \    if actual_library_ids != expected_library_ids:\n        issues.append('library\
          \ 命令顺序或完整性不一致')\n    if missing_ids:\n        issues.append('缺少 library\
          \ 命令：' + _join_or_none(missing_ids))\n    if generated_ids:\n        issues.append('追加\
          \ generated 命令：' + _join_or_none(generated_ids))\n    if unknown_source_ids:\n\
          \        issues.append('source 异常命令：' + _join_or_none(unknown_source_ids))\n\
          \    if not issues:\n        return f'完整性通过：期望 {len(expected_library_ids)}\
          \ 条 library 命令，实际 {len(actual_library_ids)} 条，顺序一致，无缺失，无额外 generated 命令。'\n\
          \    return '完整性未通过：' + '；'.join(issues)\n\ndef main(full_review_text: str,\
          \ partial_review_text: str, full_planner_text: str, partial_planner_text:\
          \ str, command_library_json: str):\n    review_text = _choose_text(full_review_text,\
          \ partial_review_text)\n    planner_text = _choose_text(full_planner_text,\
          \ partial_planner_text)\n\n    try:\n        review_payload = _extract_json(review_text)\n\
          \    except Exception:\n        review_payload = {}\n\n    try:\n      \
          \  planner_payload = _extract_json(planner_text)\n    except Exception:\n\
          \        planner_payload = {}\n\n    decision = str(review_payload.get('decision')\
          \ or review_payload.get('gate_decision') or '').strip().lower()\n    if\
          \ decision not in {'auto_execute', 'human_review'}:\n        decision =\
          \ 'human_review'\n\n    risk_level = str(review_payload.get('risk_level')\
          \ or '').strip().lower()\n    if not risk_level:\n        risk_level = 'low'\
          \ if decision == 'auto_execute' else 'uncertain'\n\n    summary = str(review_payload.get('summary')\
          \ or review_payload.get('review_summary') or review_payload.get('reason')\
          \ or '').strip()\n    if not summary:\n        summary = '全部候选命令通过自动安全复核，可直接执行。'\
          \ if decision == 'auto_execute' else '候选命令存在高风险或不确定性，需人工审核后决定是否执行。'\n\n\
          \    library_version, library_commands = _load_command_library(command_library_json)\n\
          \    expected_library_ids = [item['id'] for item in library_commands]\n\n\
          \    plan_mode = str(planner_payload.get('plan_mode') or '').strip().lower()\n\
          \    full_text = (full_planner_text or '').strip()\n    chosen_text = (planner_text\
          \ or '').strip()\n    if plan_mode not in {'full_inspection', 'targeted_inspection'}:\n\
          \        plan_mode = 'full_inspection' if full_text and chosen_text == full_text\
          \ else 'targeted_inspection'\n\n    commands = _normalize_commands(planner_payload.get('commands'))\n\
          \    total_count = len(commands)\n    library_ids = [item['id'] for item\
          \ in commands if item['source'] == 'library']\n    generated_ids = [item['id']\
          \ for item in commands if item['source'] == 'generated']\n    unknown_source_ids\
          \ = [item['id'] for item in commands if item['source'] == 'unknown']\n \
          \   missing_library_ids = [cid for cid in expected_library_ids if cid not\
          \ in library_ids]\n    integrity_summary = _build_integrity_summary(plan_mode,\
          \ expected_library_ids, library_ids, generated_ids, unknown_source_ids)\n\
          \n    return {\n        'decision': decision,\n        'risk_level': risk_level,\n\
          \        'review_summary': summary,\n        'planner_text': planner_text,\n\
          \        'plan_mode': plan_mode,\n        'is_full_inspection': '是' if plan_mode\
          \ == 'full_inspection' else '否',\n        'total_command_count': str(total_count),\n\
          \        'library_command_count': str(len(library_ids)),\n        'generated_command_count':\
          \ str(len(generated_ids)),\n        'generated_command_list': _join_or_none(generated_ids),\n\
          \        'unknown_source_command_list': _join_or_none(unknown_source_ids),\n\
          \        'command_library_version': library_version,\n        'expected_library_count':\
          \ str(len(expected_library_ids)) if plan_mode == 'full_inspection' else\
          \ '不适用',\n        'actual_library_count': str(len(library_ids)) if plan_mode\
          \ == 'full_inspection' else '不适用',\n        'missing_library_commands':\
          \ _join_or_none(missing_library_ids) if plan_mode == 'full_inspection' else\
          \ '不适用',\n        'integrity_summary': integrity_summary,\n    }"
