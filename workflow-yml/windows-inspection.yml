    selector:
    - conversation
    - last_customer_message
    value: ''
    value_type: string
  - description: 最近一次巡检 Agent 地址
    id: cdf30913-544d-4958-89df-598dcd055c5f
    name: last_agent_base_url
    selector:
    - conversation
    - last_agent_base_url
    value: ''
    value_type: string
  - description: 最近一次巡检 host
    id: bdb33f4c-6526-4c66-885b-11ec7c98eee2
    name: last_host_payload
    selector:
    - conversation
    - last_host_payload
    value: ''
    value_type: string
  - description: 最近一次巡检任务 ID
    id: 2dbdd049-1068-41d8-ad90-eebf5dc44fe2
    name: last_task_id
    selector:
    - conversation
    - last_task_id
    value: ''
    value_type: string
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: 巡检助手 现在开始巡检吗？
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 新的全量巡检
    - 所有问题分析
    - 是否需要人工介入
    suggested_questions_after_answer:
      enabled: true
      model:
        completion_params:
          echo: false
          frequency_penalty: 0
          max_tokens: 0
          presence_penalty: 0
          stop: []
          temperature: 0.7
          top_p: 0
        mode: chat
        name: minimax-m2.7
        provider: langgenius/minimax/minimax
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
