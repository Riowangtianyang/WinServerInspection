    - data:
        code: "import re\n\n\ndef _normalize(text):\n    text = (text or '').strip().lower()\n\
          \    text = re.sub(r'\\s+', '', text)\n    return text\n\n\ndef main(query=''):\n\
          \    normalized = _normalize(query)\n    negative_patterns = ['不要巡检', '别巡检',\
          \ '不用巡检', '先别巡检']\n    explicit_patterns = [\n        '帮我巡检', '开始巡检', '执行巡检',\
          \ '立即巡检', '现在巡检',\n        '做一次巡检', '重新执行巡检', '重新巡检', '再跑一次巡检',\n      \
          \  '再巡检一次', '重新跑一次巡检', '再做一次巡检', '跑一次巡检',\n    ]\n\n    matched_reason =\
          \ ''\n    route = ''\n    if any(pattern in normalized for pattern in negative_patterns):\n\
          \        matched_reason = 'negative'\n    elif normalized in ('巡检', '开始',\
          \ '开始巡检', '执行', '执行巡检'):\n        route = '__RUN_INSPECTION__'\n       \
          \ matched_reason = 'exact'\n    elif any(pattern in normalized for pattern\
          \ in explicit_patterns):\n        route = '__RUN_INSPECTION__'\n       \
          \ matched_reason = 'pattern'\n    elif '巡检' in normalized and any(keyword\
          \ in normalized for keyword in ('再', '重新', '开始', '执行', '立即', '现在', '帮我',\
          \ '跑一次', '做一次')):\n        route = '__RUN_INSPECTION__'\n        matched_reason\
          \ = 'keyword_combo'\n\n    return {\n        'route': route,\n        'matched_reason':\
          \ matched_reason,\n        'normalized_query': normalized,\n    }\n"
