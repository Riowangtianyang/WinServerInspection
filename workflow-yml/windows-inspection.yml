    - data:
        code: "import html\nimport re\n\n\ndef _is_table_row(line: str) -> bool:\n\
          \    stripped = (line or '').strip()\n    return stripped.startswith('|')\
          \ and stripped.endswith('|') and stripped.count('|') >= 2\n\n\ndef _is_separator_row(line:\
          \ str) -> bool:\n    stripped = (line or '').strip().strip('|').strip()\n\
          \    if not stripped:\n        return False\n    cells = [cell.strip() for\
          \ cell in stripped.split('|')]\n    return bool(cells) and all(re.fullmatch(r':?-{3,}:?',\
          \ cell or '') for cell in cells)\n\n\ndef _parse_cells(line: str) -> list[str]:\n\
          \    stripped = (line or '').strip()\n    if stripped.startswith('|'):\n\
          \        stripped = stripped[1:]\n    if stripped.endswith('|'):\n     \
          \   stripped = stripped[:-1]\n\n    cells = []\n    current = []\n    escaped\
          \ = False\n    for char in stripped:\n        if escaped:\n            current.append(char)\n\
          \            escaped = False\n            continue\n        if char == '\\\
          \\':\n            escaped = True\n            continue\n        if char\
          \ == '|':\n            cells.append(''.join(current).strip())\n        \
          \    current = []\n            continue\n        current.append(char)\n\
          \    cells.append(''.join(current).strip())\n    return cells\n\n\ndef _cell_html(value:\
          \ str) -> str:\n    escaped = html.escape((value or '').replace('\\\\|',\
          \ '|'), quote=False)\n    return escaped.replace('&lt;br&gt;', '<br/>')\n\
          \n\ndef _build_html_table(header: list[str], rows: list[list[str]]) -> str:\n\
          \    parts = ['<table>', '<thead>', '<tr>']\n    for cell in header:\n \
          \       parts.append(f'<th>{_cell_html(cell)}</th>')\n    parts.extend(['</tr>',\
          \ '</thead>', '<tbody>'])\n    for row in rows:\n        parts.append('<tr>')\n\
          \        for cell in row:\n            parts.append(f'<td>{_cell_html(cell)}</td>')\n\
          \        parts.append('</tr>')\n    parts.extend(['</tbody>', '</table>'])\n\
          \    return ''.join(parts)\n\n\ndef _convert_pipe_tables(markdown_text:\
          \ str) -> str:\n    lines = (markdown_text or '').splitlines()\n    output\
          \ = []\n    index = 0\n    in_fence = False\n\n    while index < len(lines):\n\
          \        line = lines[index]\n        if line.strip().startswith('```'):\n\
          \            in_fence = not in_fence\n            output.append(line)\n\
          \            index += 1\n            continue\n\n        if not in_fence\
          \ and index + 1 < len(lines) and _is_table_row(line) and _is_separator_row(lines[index\
          \ + 1]):\n            header = _parse_cells(line)\n            rows = []\n\
          \            cursor = index + 2\n            while cursor < len(lines) and\
          \ _is_table_row(lines[cursor]):\n                rows.append(_parse_cells(lines[cursor]))\n\
          \                cursor += 1\n            output.append(_build_html_table(header,\
          \ rows))\n            index = cursor\n            continue\n\n        output.append(line)\n\
          \        index += 1\n\n    return '\\n'.join(output)\n\n\ndef main(report_markdown:\
          \ str = '', summary_markdown: str = ''):\n    report_markdown = (report_markdown\
          \ or '').strip()\n    summary_markdown = (summary_markdown or '').strip()\n\
          \    if report_markdown and summary_markdown:\n        combined = report_markdown\
          \ + '\\n\\n---\\n\\n' + summary_markdown\n    else:\n        combined =\
          \ report_markdown or summary_markdown\n    return {\n        'markdown':\
          \ _convert_pipe_tables(combined),\n    }\n"
        code_language: python3
