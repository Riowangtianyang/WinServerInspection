    - data:
        code: "import json\nimport time\nfrom urllib import error, request\n\nPOLL_INTERVAL_SECONDS\
          \ = 0.5\nPOLL_WINDOW_SECONDS = 14.0\nMAX_REQUEST_TIMEOUT_SECONDS = 2.0\n\
          \n\ndef _request_json(method: str, url: str, payload=None, timeout: float\
          \ = MAX_REQUEST_TIMEOUT_SECONDS):\n    data = None\n    headers = {'Content-Type':\
          \ 'application/json'}\n    if payload is not None:\n        data = json.dumps(payload).encode('utf-8')\n\
          \    req = request.Request(url, data=data, headers=headers, method=method)\n\
          \    with request.urlopen(req, timeout=timeout) as resp:\n        body =\
          \ resp.read().decode('utf-8')\n        return resp.status, json.loads(body)\
          \ if body else {}\n\n\ndef main(agent_base_url: str, host_payload: str,\
          \ trigger_body: str):\n    base_url = (agent_base_url or '').strip().rstrip('/')\n\
          \    host_payload = (host_payload or '').strip()\n    task_id = ''\n   \
          \ try:\n        trigger_json = json.loads(trigger_body or '{}')\n      \
          \  if isinstance(trigger_json, dict):\n            task_id = str(trigger_json.get('task_id')\
          \ or '')\n    except Exception:\n        task_id = ''\n\n    if not base_url\
          \ or not host_payload:\n        return {\n            'poll_status': 'progress_failed',\n\
          \            'poll_message': '轮询前缺少 Agent 地址或目标 host。',\n            'poll_trace':\
          \ '[]',\n            'task_id': task_id,\n        }\n\n    deadline = time.monotonic()\
          \ + POLL_WINDOW_SECONDS\n    trace = []\n\n    while True:\n        remaining\
          \ = deadline - time.monotonic()\n        if remaining <= 0:\n          \
          \  break\n\n        request_timeout = min(MAX_REQUEST_TIMEOUT_SECONDS, max(0.5,\
          \ remaining))\n\n        try:\n            _, progress = _request_json(\n\
          \                'POST',\n                f'{base_url}/api/v1/check-progress',\n\
          \                {'host': host_payload},\n                timeout=request_timeout,\n\
          \            )\n        except error.HTTPError as exc:\n            detail\
          \ = exc.read().decode('utf-8', errors='ignore')\n            trace.append({'status':\
          \ 'progress_http_error', 'detail': detail, 'status_code': exc.code})\n \
          \           return {\n                'poll_status': 'progress_http_error',\n\
          \                'poll_message': '巡检任务已触发，但查询进度接口返回错误。',\n             \
          \   'poll_trace': json.dumps(trace, ensure_ascii=False),\n             \
          \   'task_id': task_id,\n            }\n        except Exception as exc:\n\
          \            trace.append({'status': 'progress_failed', 'detail': str(exc)})\n\
          \            return {\n                'poll_status': 'progress_failed',\n\
          \                'poll_message': '巡检任务已触发，但查询进度失败。',\n                'poll_trace':\
          \ json.dumps(trace, ensure_ascii=False),\n                'task_id': task_id,\n\
          \            }\n\n        trace.append({\n            'status': progress.get('status'),\n\
          \            'progress': progress.get('progress'),\n            'current_step':\
          \ progress.get('current_step'),\n            'message': progress.get('message'),\n\
          \            'report_available': progress.get('report_available'),\n   \
          \     })\n\n        if progress.get('task_id'):\n            task_id = str(progress.get('task_id'))\n\
          \n        if progress.get('status') == 'completed' or progress.get('report_available')\
          \ is True:\n            return {\n                'poll_status': 'completed',\n\
          \                'poll_message': '巡检进度已完成，可以获取报告。',\n                'poll_trace':\
          \ json.dumps(trace, ensure_ascii=False),\n                'task_id': task_id,\n\
          \            }\n\n        if progress.get('status') == 'failed':\n     \
          \       return {\n                'poll_status': 'failed',\n           \
          \     'poll_message': progress.get('message') or '巡检执行失败，请人工检查目标机器。',\n\
          \                'poll_trace': json.dumps(trace, ensure_ascii=False),\n\
          \                'task_id': task_id,\n            }\n\n        remaining\
          \ = deadline - time.monotonic()\n        if remaining <= 0:\n          \
          \  break\n\n        time.sleep(min(POLL_INTERVAL_SECONDS, remaining))\n\n\
          \    return {\n        'poll_status': 'timeout',\n        'poll_message':\
          \ '巡检任务已触发，但在当前轮询窗口内尚未完成，请稍后重试。',\n        'poll_trace': json.dumps(trace,\
          \ ensure_ascii=False),\n        'task_id': task_id,\n    }\n"
