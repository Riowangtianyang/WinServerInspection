app:
  description: 基于 Windows Local Agent 的巡检问答 Chatflow
  icon: 🖥️
  icon_background: '#D8F5E8'
  icon_type: emoji
  mode: advanced-chat
  name: Windows巡检问答
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.6.0
workflow:
  conversation_variables:
  - description: 最近一次巡检结果 JSON
    id: 1f8a5c2b-6dc9-4414-804c-b1852b645b34
    name: last_report_context
    selector:
    - conversation
    - last_report_context
    value: ''
    value_type: string
  - description: 最近一次巡检状态
    id: 17a1dc7c-07b4-43a1-abbf-482d6b988669
