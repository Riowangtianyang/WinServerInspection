        code: "def _ensure_list(value):\n    if value is None:\n        return []\n\
          \    if isinstance(value, list):\n        return value\n    return [value]\n\
          \n\ndef _escape_attr(value):\n    return (value or '').replace('&', '&amp;').replace('\"\
          ', '&quot;').replace('<', '&lt;').replace('>', '&gt;')\n\n\ndef main(files=None):\n\
          \    file_list = _ensure_list(files)\n    first = next((item for item in\
          \ file_list if isinstance(item, dict)), None)\n    file_name = 'Windows巡检全量报告.docx'\n\
          \    download_url = ''\n\n    if first:\n        file_name = str(first.get('name')\
          \ or first.get('filename') or file_name)\n        download_url = str(first.get('url')\
          \ or '').strip()\n\n    if download_url:\n        safe_url = _escape_attr(download_url)\n\
          \        safe_name = _escape_attr(file_name)\n        download_markdown\
          \ = f'<a href=\"{safe_url}\">{safe_name}</a>'\n        link_status = 'ready'\n\
          \    else:\n        download_markdown = 'Word 报告暂未生成可下载链接，请稍后重试。'\n    \
