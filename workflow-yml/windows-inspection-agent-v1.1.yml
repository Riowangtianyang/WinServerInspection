          \    if generated_ids:\n        issues.append('追加 generated 命令：' + _join_or_none(generated_ids))\n\
          \    if unknown_source_ids:\n        issues.append('source 异常命令：' + _join_or_none(unknown_source_ids))\n\
          \    if not issues:\n        return f'完整性通过：期望 {len(expected_library_ids)}\
          \ 条 library 命令，实际 {len(actual_library_ids)} 条，顺序一致。'\n    return '完整性未通过：'\
          \ + '；'.join(issues)\n\ndef main(planner_text: str, rule_planner_text: str,\
          \ machine_ip: str, command_library_json: str):\n    chosen_planner_text\
          \ = (rule_planner_text or '').strip() or (planner_text or '').strip()\n\
          \    payload = _extract_json(chosen_planner_text)\n    plan_mode = _normalize_plan_mode(payload)\n\
          \    reason = str(payload.get('reason') or payload.get('purpose') or '').strip()\
          \ or '无'\n    history_basis = str(payload.get('history_basis') or '').strip()\
