        code: "import json\n\ndef _extract_json(text: str):\n    raw = (text or '').strip()\n\
          \    if not raw:\n        raise ValueError('route decision returned empty\
          \ text')\n    fence = chr(96) * 3\n    if fence in raw:\n        parts =\
          \ [part.strip() for part in raw.split(fence) if part.strip()]\n        for\
          \ part in parts:\n            lowered = part.lower()\n            if lowered.startswith('json'):\n\
          \                raw = part[4:].strip()\n                break\n    if raw.lower().startswith('json'):\n\
          \        raw = raw[4:].strip()\n    start = raw.find('{')\n    end = raw.rfind('}')\n\
          \    if start == -1 or end == -1 or end < start:\n        raise ValueError('route\
          \ output is not a JSON object')\n    payload = json.loads(raw[start:end\
          \ + 1])\n    if not isinstance(payload, dict):\n        raise ValueError('route\
          \ output must be a JSON object')\n    return payload\n\ndef main(route_text:\
          \ str, user_query: str):\n    payload = _extract_json(route_text)\n    raw\
          \ = str(payload.get('route_mode') or '').strip().lower()\n    mapping =\
          \ {\n        'direct': 'direct_answer',\n        'reply': 'reply_from_history',\n\
          \        'history': 'reply_from_history',\n        'history_reply': 'reply_from_history',\n\
          \        'clarify': 'ask_clarify',\n        'plan_inspection': 'execute',\n\
          \        'inspection': 'execute',\n        'plan': 'execute',\n    }\n \
          \   route_mode = mapping.get(raw, raw)\n    if route_mode not in {'direct_answer',\
          \ 'reply_from_history', 'ask_clarify', 'execute'}:\n        raise ValueError('invalid\
          \ route_mode: ' + (route_mode or raw or '<empty>'))\n    history_basis =\
          \ str(payload.get('history_basis') or '').strip() or '无'\n    reason = str(payload.get('reason')\
          \ or '').strip() or '无'\n    return {'route_mode': route_mode, 'history_basis':\
          \ history_basis, 'reason': reason}"
