        body:
          data: '{}'
          type: json
        code: "import json\nimport re\nimport uuid\n\nFULL_INSPECTION_KEYWORDS = (\n\
          \    '全量检查',\n    '全面检查',\n    '全量巡检',\n    '全面巡检',\n    '完整巡检',\n    '全部检查',\n\
          \    '全量体检',\n    '做一遍巡检',\n)\n\nHIGH_RISK_PATTERNS = (\n    r'重启(服务|服务器|主机|系统|域控)?',\n\
          \    r'停止(服务|进程)?',\n    r'删除(用户|账户|文件|目录|规则|策略)?',\n    r'卸载',\n    r'安装',\n\
          \    r'开启防火墙',\n    r'关闭防火墙',\n    r'修改(配置|注册表|策略|服务|账户)',\n    r'更改(配置|注册表|策略|服务|账户)',\n\
          \    r'创建(用户|账户|任务)',\n    r'新增(用户|账户|任务)',\n    r'恢复(服务|配置|系统)',\n    r'启用(账户|服务|防火墙)',\n\
          \    r'禁用(账户|服务|防火墙)',\n    r'\\b(restart|shutdown|reboot|stop-service|set-service|remove-|disable-|enable-|del\\\
          b|rm\\b)\\b',\n)\n\nRULE_SETS = [\n    {\n        'name': '主机基础信息',\n  \
          \      'keywords': ('机器信息', '主机信息', '基础信息', '系统信息', '服务器信息', '服务器状态', '运行状态',\
          \ '主机状态'),\n        'command_ids': ('host_domain_role_probe', 'host_os_probe',\
          \ 'host_identity_probe', 'host_time_probe', 'srv_disk_space', 'srv_uptime'),\n\
          \    },\n    {\n        'name': '磁盘空间检查',\n        'keywords': ('磁盘', '磁盘空间',\
          \ '硬盘', '盘符', '空间使用率'),\n        'command_ids': ('host_os_probe', 'srv_disk_space'),\n\
          \    },\n    {\n        'name': '运行时间检查',\n        'keywords': ('运行时间',\
          \ 'uptime', '最近重启', '开机多久', '启动时间'),\n        'command_ids': ('host_os_probe',\
          \ 'srv_uptime'),\n    },\n    {\n        'name': 'AD复制状态',\n        'keywords':\
          \ ('ad复制', '域复制', '复制状态', '复制摘要', '复制详情', 'replsummary', 'showrepl'),\n\
          \        'command_ids': ('host_domain_role_probe', 'ad_tooling_probe', 'ad_repadmin_summary',\
          \ 'ad_repadmin_status'),\n    },\n    {\n        'name': '域控与域信息',\n   \
          \     'keywords': ('域控制器', '域控列表', 'dc列表', '域信息', '林信息', 'domaincontroller'),\n\
          \        'command_ids': ('host_domain_role_probe', 'ad_domain_controllers',\
          \ 'ad_domain_info', 'ad_forest_info'),\n    },\n    {\n        'name': 'FSMO角色检查',\n\
          \        'keywords': ('fsmo', '五大角色', '角色持有者'),\n        'command_ids':\
          \ ('host_domain_role_probe', 'ad_domain_info', 'ad_forest_info', 'ad_fsmo_roles'),\n\
          \    },\n    {\n        'name': '域控健康检查',\n        'keywords': ('域控健康',\
          \ '域控诊断', 'dcdiag', 'dns专项', 'dns检查'),\n        'command_ids': ('host_domain_role_probe',\
          \ 'ad_tooling_probe', 'ad_ntds_service_probe', 'ad_dcdiag_full', 'ad_dcdiag_dns'),\n\
          \    },\n    {\n        'name': '禁用账户检查',\n        'keywords': ('禁用用户',\
          \ '禁用账户', '停用用户', '停用账户'),\n        'command_ids': ('host_domain_role_probe',\
          \ 'ad_disabled_users'),\n    },\n    {\n        'name': '锁定账户检查',\n    \
          \    'keywords': ('锁定用户', '锁定账户', 'lockedout', 'lockedusers'),\n       \
          \ 'command_ids': ('host_domain_role_probe', 'ad_locked_out_users'),\n  \
          \  },\n    {\n        'name': '密码永不过期账户',\n        'keywords': ('密码永不过期',\
          \ 'neverexpires', 'neverexpire'),\n        'command_ids': ('host_domain_role_probe',\
          \ 'ad_password_never_expires'),\n    },\n    {\n        'name': '90天未登录账户',\n\
          \        'keywords': ('90天未登录', '长期未登录', 'inactiveusers', 'inactiveuser'),\n\
          \        'command_ids': ('host_domain_role_probe', 'ad_inactive_users_90days'),\n\
          \    },\n    {\n        'name': 'GPO列表',\n        'keywords': ('gpo', '组策略'),\n\
          \        'command_ids': ('host_domain_role_probe', 'ad_gpo_list'),\n   \
          \ },\n    {\n        'name': 'DNS区域检查',\n        'keywords': ('dns区域', 'dns配置',\
          \ 'dnszone', '区域列表'),\n        'command_ids': ('host_domain_role_probe',\
          \ 'ad_dns_zones'),\n    },\n    {\n        'name': 'Exchange基础巡检',\n   \
          \     'keywords': ('exchange', '邮箱数据库', 'dag', '邮件队列', '证书状态', 'exchange健康'),\n\
          \        'command_ids': ('exchange_server_list', 'exchange_health_report',\
          \ 'exchange_component_state', 'exchange_database_status', 'exchange_dag_status',\
          \ 'exchange_mail_queues', 'exchange_certificates'),\n    },\n]\n\ndef _normalize(text:\
          \ str) -> str:\n    value = (text or '').strip().lower()\n    value = re.sub(r'\\\
          s+', '', value)\n    return value\n\ndef _load_library(command_library_json:\
          \ str):\n    try:\n        payload = json.loads(command_library_json or\
          \ '{}')\n    except Exception:\n        return '', [], {}\n    commands\
          \ = payload.get('commands') if isinstance(payload, dict) else []\n    if\
          \ not isinstance(commands, list):\n        commands = []\n    normalized_commands\
          \ = []\n    lookup = {}\n    for item in commands:\n        if not isinstance(item,\
          \ dict):\n            continue\n        command_id = str(item.get('id')\
          \ or '').strip()\n        shell = str(item.get('shell') or '').strip()\n\
          \        if not command_id or not shell:\n            continue\n       \
          \ copied = dict(item)\n        normalized_commands.append(copied)\n    \
          \    lookup[command_id] = copied\n    version = str(payload.get('version')\
          \ or '').strip() if isinstance(payload, dict) else ''\n    return version,\
          \ normalized_commands, lookup\n\ndef _match_keywords(query: str, keywords)\
          \ -> bool:\n    return any(_normalize(keyword) in query for keyword in keywords)\n\
          \ndef _is_high_risk(query: str) -> bool:\n    return any(re.search(pattern,\
          \ query, re.IGNORECASE) for pattern in HIGH_RISK_PATTERNS)\n\ndef _append_unique(target,\
          \ values):\n    for value in values:\n        if value not in target:\n\
          \            target.append(value)\n\ndef _select_rule_plan(query: str, library_commands,\
          \ lookup):\n    if not query:\n        return 'no', [], [], 'empty_query'\n\
          \    if _is_high_risk(query):\n        return 'no', [], [], 'detected_high_risk_intent'\n\
          \    if _match_keywords(query, FULL_INSPECTION_KEYWORDS):\n        command_ids\
          \ = [str(item.get('id') or '').strip() for item in library_commands if str(item.get('id')\
          \ or '').strip()]\n        return 'yes', command_ids, ['全量检查'], 'full_inspection'\n\
          \    matched_names = []\n    command_ids = []\n    for rule in RULE_SETS:\n\
          \        if _match_keywords(query, rule['keywords']):\n            matched_names.append(rule['name'])\n\
          \            _append_unique(command_ids, rule['command_ids'])\n    filtered_ids\
          \ = [command_id for command_id in command_ids if command_id in lookup]\n\
          \    if not filtered_ids:\n        return 'no', [], matched_names, 'no_stable_rule_match'\n\
          \    return 'yes', filtered_ids, matched_names, 'targeted_inspection'\n\n\
          def main(query: str, machine_ip: str, command_library_json: str):\n    normalized_query\
          \ = _normalize(query)\n    library_version, library_commands, lookup = _load_library(command_library_json)\n\
          \    use_rule, command_ids, matched_names, plan_mode = _select_rule_plan(normalized_query,\
          \ library_commands, lookup)\n    if use_rule != 'yes':\n        return {\n\
          \            'use_rule': 'no',\n            'planner_text': '',\n      \
          \      'match_reason': '未命中稳定规则，转入 LLM 规划链路。' if plan_mode == 'no_stable_rule_match'\
          \ else '检测到潜在变更意图，转入 LLM 审核链路。' if plan_mode == 'detected_high_risk_intent'\
          \ else '查询为空或命令库不可用，转入 LLM 规划链路。',\n        }\n    if plan_mode == 'full_inspection':\n\
          \        allowed = set(command_ids)\n        ordered_ids = [str(item.get('id')\
          \ or '').strip() for item in library_commands if str(item.get('id') or '').strip()\
          \ in allowed]\n    else:\n        ordered_ids = command_ids\n    commands\
          \ = []\n    for command_id in ordered_ids:\n        item = lookup.get(command_id)\n\
          \        if not item:\n            continue\n        commands.append({\n\
          \            'id': command_id,\n            'shell': str(item.get('shell')\
          \ or '').strip(),\n            'source': 'library',\n        })\n    if\
          \ not commands:\n        return {\n            'use_rule': 'no',\n     \
          \       'planner_text': '',\n            'match_reason': '命中规则但命令库缺少对应 shell，转入\
          \ LLM 规划链路。',\n        }\n    reason = '命中规则包：' + '、'.join(matched_names)\
          \ if matched_names else '命中全量检查规则'\n    review_summary = f'命中命令库固定规则，直接使用\
          \ {len(commands)} 条 library 命令，无需 LLM 生成命令。'\n    payload = {\n        'action':\
          \ 'plan_inspection',\n        'history_basis': '命中固定规则，无需依赖会话历史。',\n   \
