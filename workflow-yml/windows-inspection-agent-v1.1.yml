    - data:
        authorization:
          config: null
          type: no-auth
        body:
          data: '{}'
          type: json
        code: "import json\n\nSOURCE_LABELS = {\n    'library': '命令库匹配',\n    'generated':\
          \ 'AI 生成',\n    'unknown': '来源待确认',\n}\n\nRISK_LABELS = {\n    'low': '低',\n\
          \    'medium': '中',\n    'high': '高',\n    'uncertain': '待确认',\n}\n\nPURPOSE_HINTS\
          \ = [\n    ('host_domain_role', '识别主机域角色'),\n    ('host_os', '读取系统版本与构建号'),\n\
          \    ('host_identity', '检查当前账户与管理员权限'),\n    ('host_time', '读取主机时间与时区'),\n\
          \    ('tooling', '检查 AD 诊断工具是否可用'),\n    ('ntds_service', '检查 NTDS 服务是否存在'),\n\
          \    ('domain_controllers', '读取域控制器列表'),\n    ('domain_info', '读取 AD 域信息'),\n\
          \    ('forest_info', '读取 AD 林信息'),\n    ('fsmo', '查看 FSMO 角色归属'),\n    ('repadmin_summary',\
          \ '检查 AD 复制摘要'),\n    ('repadmin_status', '检查 AD 复制详情'),\n    ('dcdiag_full',\
          \ '执行 DCDiag 全量诊断'),\n    ('dcdiag_dns', '执行 DCDiag DNS 诊断'),\n    ('disabled_users',\
          \ '检查已禁用用户'),\n    ('inactive_users', '检查长期未登录用户'),\n    ('password_never_expires',\
          \ '检查密码永不过期账户'),\n    ('locked_out_users', '检查被锁定账户'),\n    ('gpo', '读取组策略列表'),\n\
          \    ('dns_zones', '读取 DNS 区域配置'),\n    ('exchange_server', '读取 Exchange\
          \ 服务器列表'),\n    ('exchange_health', '读取 Exchange 健康报告'),\n    ('exchange_component',\
          \ '读取 Exchange 组件状态'),\n    ('exchange_database', '读取 Exchange 数据库状态'),\n\
          \    ('exchange_dag', '读取 Exchange DAG 状态'),\n    ('exchange_mail_queues',\
          \ '读取 Exchange 邮件队列状态'),\n    ('exchange_certificates', '读取 Exchange 证书状态'),\n\
          \    ('disk', '检查磁盘空间'),\n    ('uptime', '检查主机运行时长'),\n    ('service', '检查服务运行状态'),\n\
          \    ('firewall', '检查防火墙状态'),\n    ('defender', '检查 Defender 防护状态'),\n \
          \   ('security', '检查安全配置'),\n]\n\n\ndef _parse_object(text: str):\n    try:\n\
          \        data = json.loads((text or '').strip() or '{}')\n        return\
          \ data if isinstance(data, dict) else {}\n    except Exception:\n      \
          \  return {}\n\n\ndef _parse_list(text: str):\n    try:\n        data =\
          \ json.loads((text or '').strip() or '[]')\n        return data if isinstance(data,\
          \ list) else []\n    except Exception:\n        return []\n\n\ndef _risk_label(value:\
          \ str):\n    return RISK_LABELS.get(str(value or '').strip().lower(), '待确认')\n\
          \n\ndef _source_label(value: str):\n    return SOURCE_LABELS.get(str(value\
          \ or '').strip().lower(), '来源待确认')\n\n\ndef _plan_label(value: str):\n \
          \   return '全量检查' if str(value or '').strip() == '是' else '定向检查'\n\n\ndef\
          \ _purpose(command: dict):\n    command_id = str(command.get('id') or '').lower()\n\
          \    for token, label in PURPOSE_HINTS:\n        if token in command_id:\n\
          \            return label\n    return '采集系统与安全状态信息'\n\n\ndef _focus_commands(commands):\n\
          \    return [cmd for cmd in commands if str(cmd.get('source') or '').strip().lower()\
          \ != 'library']\n\n\ndef _render_focus_command_blocks(commands):\n    blocks\
          \ = []\n    for index, command in enumerate(commands, start=1):\n      \
          \  command_id = str(command.get('id') or ('cmd_' + str(index))).strip()\n\
          \        source_label = _source_label(command.get('source'))\n        shell\
          \ = str(command.get('shell') or '').strip() or '# 未提供命令原文'\n        blocks.extend([\n\
          \            str(index) + '. ' + command_id + '（' + source_label + '）',\n\
          \            '~~~powershell',\n            shell,\n            '~~~',\n\
          \            '',\n        ])\n    while blocks and blocks[-1] == '':\n \
          \       blocks.pop()\n    return blocks\n\n\ndef _approval_reason(review_summary:\
          \ str, risk_level: str, is_full_inspection: str, integrity_summary: str,\
          \ focus_commands):\n    parts = []\n    if str(is_full_inspection or '').strip()\
          \ == '是' and str(integrity_summary or '').strip():\n        if '完整性未通过'\
          \ in str(integrity_summary):\n            parts.append('全量检查的命令库完整性校验未通过')\n\
          \    if focus_commands:\n        parts.append(f'存在 {len(focus_commands)}\
          \ 条来源待确认或非白名单命令')\n    risk_value = str(risk_level or '').strip().lower()\n\
          \    if risk_value in {'medium', 'high', 'uncertain'}:\n        parts.append(f'风险级别为{_risk_label(risk_level)}')\n\
          \    if not parts:\n        parts.append('系统要求人工确认后再执行')\n    summary =\
          \ '，'.join(parts)\n    review_summary = str(review_summary or '').strip()\n\
          \    if review_summary and review_summary not in summary:\n        summary\
          \ = summary + '。系统摘要：' + review_summary if summary else review_summary\n\
          \    return summary\n\n\ndef main(planner_text: str, normalized_commands_json:\
          \ str, review_summary: str, risk_level: str, is_full_inspection: str, integrity_summary:\
          \ str):\n    payload = _parse_object(planner_text)\n    commands = _parse_list(normalized_commands_json)\n\
          \    focus_commands = _focus_commands(commands)\n    library_count = sum(1\
          \ for item in commands if str(item.get('source') or '').strip().lower()\
          \ == 'library')\n    generated_count = sum(1 for item in commands if str(item.get('source')\
          \ or '').strip().lower() == 'generated')\n    unknown_count = sum(1 for\
          \ item in commands if str(item.get('source') or '').strip().lower() == 'unknown')\n\
          \    approval_reason = _approval_reason(review_summary, risk_level, is_full_inspection,\
          \ integrity_summary, focus_commands)\n\n    overview = [\n        '### 审批摘要',\n\
          \        '',\n        '| 项目 | 内容 |',\n        '|---|---|',\n        '| 进入审批的直接原因\
          \ | ' + approval_reason + ' |',\n        '| 风险级别 | ' + _risk_label(risk_level)\
          \ + ' |',\n        '| 巡检类型 | ' + _plan_label(is_full_inspection) + ' |',\n\
          \        '| 目标主机 | ' + str(payload.get('target_host') or '未提供') + ' |',\n\
          \        '| 命令总数 | ' + str(len(commands)) + ' |',\n        '| 命令库匹配 | '\
          \ + str(library_count) + ' 条 |',\n        '| 需重点审核 | ' + str(len(focus_commands))\
          \ + ' 条 |',\n        '| 其余命令 | 其余 ' + str(library_count) + ' 条为命令库匹配的只读巡检命令，本卡片不再逐条展开。\
          \ |',\n    ]\n\n    summary = ['### 需重点审核的命令', '']\n    if focus_commands:\n\
          \        summary.extend([\n            '| 序号 | 作用 | 来源 | 命令 ID |',\n   \
          \         '|---|---|---|---|',\n        ])\n        for index, command in\
          \ enumerate(focus_commands, start=1):\n            summary.append('| ' +\
          \ str(index) + ' | ' + _purpose(command) + ' | ' + _source_label(command.get('source'))\
          \ + ' | ' + str(command.get('id') or ('cmd_' + str(index))) + ' |')\n  \
          \      summary.extend([\n            '',\n            '需重点确认的实际命令：',\n \
          \           '',\n        ])\n        summary.extend(_render_focus_command_blocks(focus_commands))\n\
          \    else:\n        summary.append('本次没有单条来源异常命令，当前进入审批主要是因为完整性或风险策略触发。')\n\
          \n    debug_markdown = json.dumps(payload, ensure_ascii=False, indent=2)\n\
          \    line_break = chr(10)\n    return {\n        'approval_overview_markdown':\
          \ line_break.join(overview),\n        'command_summary_markdown': line_break.join(summary),\n\
          \        'debug_markdown': debug_markdown,\n    }\n"
