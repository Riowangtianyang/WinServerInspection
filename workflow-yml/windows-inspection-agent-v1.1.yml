        code: "import json\n\ndef _load_payload(execute_body: str):\n    text = (execute_body\
          \ or '').strip()\n    if not text:\n        return {}\n    start = text.find('{')\n\
          \    end = text.rfind('}')\n    if start != -1 and end != -1 and end >=\
          \ start:\n        text = text[start:end + 1]\n    return json.loads(text)\n\
          \ndef _parse_kv_block(text: str):\n    result = {}\n    for line in (text\
          \ or '').splitlines():\n        if ':' not in line:\n            continue\n\
          \        key, value = line.split(':', 1)\n        result[key.strip()] =\
          \ value.strip()\n    return result\n\ndef _status_text(status: str):\n \
          \   mapping = {\n        'succeeded': '全部命令执行成功',\n        'partially_failed':\
          \ '部分命令执行失败',\n        'failed': '全部命令执行失败',\n    }\n    return mapping.get(status,\
          \ status or '未知')\n\ndef _bool_text(value: str):\n    normalized = (value\
          \ or '').strip().lower()\n    return normalized in {'true', '1', 'yes'}\n\
          \ndef _to_int(value):\n    try:\n        return int(str(value).strip())\n\
          \    except Exception:\n        return 0\n\ndef _clip(text: str, limit:\
          \ int = 1200):\n    raw = (text or '').strip()\n    if len(raw) <= limit:\n\
          \        return raw\n    return raw[:limit] + '...（已截断）'\n\ndef _indent(text:\
          \ str):\n    return '\\n'.join('    ' + line for line in (text or '').splitlines())\n\
          \ndef _contains_any(text: str, patterns):\n    normalized = (text or '').lower()\n\
          \    return any(pattern.lower() in normalized for pattern in patterns)\n\
          \ndef _classify_command_failure(command_id: str, stdout: str, stderr: str,\
          \ return_code, role_info: dict):\n    issues = []\n    combined = '\\n'.join([stdout\
          \ or '', stderr or ''])\n    role_text = str(role_info.get('DomainRoleText')\
          \ or '').strip()\n    if command_id.startswith('ad_') and role_text and\
          \ role_text not in {'BackupDomainController', 'PrimaryDomainController'}:\n\
          \        issues.append('主机角色不匹配')\n    if _contains_any(combined, ['未发现\
          \ NTDS 服务', '不是域控制器', 'domain controller', '在域控制器上执行', 'not a domain controller']):\n\
          \        issues.append('主机角色不匹配')\n    if _contains_any(combined, ['activedirectory\
          \ powershell 模块不可用', 'module could not be loaded', '模块不可用', '找不到 ActiveDirectory',\
          \ 'rsat-ad-powershell']):\n        issues.append('模块缺失')\n    if _contains_any(combined,\
          \ ['repadmin 不可用', 'dcdiag 不可用', '不是内部或外部命令', 'not recognized as an internal\
          \ or external command', 'dnsserver 模块或 dns 服务器工具不可用', '工具不可用']):\n     \
          \   issues.append('工具缺失')\n    if _contains_any(combined, ['access is denied',\
          \ '拒绝访问', '需要管理员权限', 'administrator', 'privilege', 'unauthorized', '未被授权',\
          \ 'elevation']):\n        issues.append('权限不足')\n    if str(return_code)\
          \ not in {'0', 'None', ''} and not issues:\n        issues.append('命令本身报错')\n\
          \    return list(dict.fromkeys(issues))\n\ndef _build_next_steps(plan_mode:\
          \ str, issue_map: dict, command_results: list, role_info: dict, tool_info:\
          \ dict, generated_count: int):\n    suggestions = []\n    if issue_map.get('主机角色不匹配'):\n\
          \        suggestions.append('如果后续要查 AD 复制、域控健康或域信息，请改在域控制器上重新执行。')\n   \
          \ if issue_map.get('模块缺失') or issue_map.get('工具缺失'):\n        suggestions.append('优先补齐\
          \ RSAT / 相关模块，或切换到已安装工具的服务器后再继续。')\n    if issue_map.get('权限不足'):\n    \
          \    suggestions.append('请以管理员身份重新执行相关命令，或确认当前账户具备所需权限。')\n\n    combined_targets\
          \ = ' '.join(\n        f\"{item.get('command_id') or item.get('id') or ''}\
          \ {item.get('shell') or ''}\"\n        for item in command_results\n   \
          \ ).lower()\n    if any(keyword in combined_targets for keyword in ['sql',\
          \ 'mssql', 'sqlserver']):\n        suggestions.append('当前结果已涉及 SQL 服务，下一步建议继续查看\
          \ SQL 服务状态、启动类型、实例端口和错误日志。')\n    if 'exchange' in combined_targets:\n \
          \       suggestions.append('当前结果已涉及 Exchange，下一步建议继续查看 Exchange 组件状态、健康报告和数据库挂载状态。')\n\
          \    if role_info.get('DomainRoleText') in {'BackupDomainController', 'PrimaryDomainController'}\
          \ or _bool_text(tool_info.get('ActiveDirectoryModuleInstalled', '')):\n\
          \        suggestions.append('如需继续排查域环境，可进一步执行 AD 复制、DCDiag、域信息或域控状态检查。')\n\
          \    if plan_mode == 'full_inspection':\n        suggestions.append('本轮全量检查已完成，下一步建议基于上面的关键结论，发起更聚焦的定向巡检。')\n\
          \    if generated_count > 0:\n        suggestions.append('本轮包含模型自生成命令，复盘时建议优先确认这些\
          \ generated 命令是否已达到预期目的。')\n    if not suggestions:\n        suggestions.append('下一步建议基于失败归因或关键结论，继续发起更聚焦的定向检查。')\n\
          \n    ordered = []\n    for item in suggestions:\n        if item not in\
          \ ordered:\n            ordered.append(item)\n    return ordered\n\ndef\
          \ main(\n    execute_body: str,\n    status_code=None,\n    plan_mode: str\
          \ = '',\n    total_command_count: str = '',\n    library_command_count:\
          \ str = '',\n    generated_command_count: str = '',\n    generated_command_list:\
          \ str = '',\n    unknown_source_command_list: str = '',\n    command_library_version:\
          \ str = '',\n    expected_library_count: str = '',\n    actual_library_count:\
          \ str = '',\n    missing_library_commands: str = '',\n    integrity_summary:\
          \ str = '',\n):\n    try:\n        payload = _load_payload(execute_body)\n\
          \    except Exception:\n        raw = (execute_body or '').strip()\n   \
          \     return {'summary': '## 执行结果\\n\\nWin Agent 返回内容无法解析。\\n\\n原始返回：\\\
          n' + (raw or '<empty>')}\n\n    status = str(payload.get('status') or 'unknown')\n\
          \    task_id = str(payload.get('task_id') or '')\n    target_host = str(payload.get('target_host')\
          \ or '')\n    message = str(payload.get('message') or '').strip()\n    report_download_url\
          \ = str(payload.get('report_download_url') or '').strip()\n    command_results\
          \ = payload.get('command_results')\n    if not isinstance(command_results,\
          \ list):\n        command_results = []\n\n    role_info = {}\n    tool_info\
          \ = {}\n    ntds_missing = False\n    success_count = 0\n    failed_count\
          \ = 0\n    issue_map = {'主机角色不匹配': [], '模块缺失': [], '工具缺失': [], '权限不足': [],\
          \ '命令本身报错': []}\n    command_sections = []\n\n    for index, item in enumerate(command_results,\
          \ start=1):\n        command_id = str(item.get('command_id') or item.get('id')\
          \ or f'cmd_{index}')\n        return_code = item.get('return_code')\n  \
          \      stdout = str(item.get('stdout') or '').strip()\n        stderr =\
          \ str(item.get('stderr') or '').strip()\n        shell = str(item.get('shell')\
          \ or '').strip()\n\n        if str(return_code) == '0':\n            success_count\
          \ += 1\n        else:\n            failed_count += 1\n\n        if command_id\
          \ == 'host_domain_role_probe':\n            role_info = _parse_kv_block(stdout)\n\
          \        elif command_id == 'ad_tooling_probe':\n            tool_info =\
          \ _parse_kv_block(stdout)\n        if '未发现 NTDS 服务' in stderr:\n       \
          \     ntds_missing = True\n\n        issues = _classify_command_failure(command_id,\
          \ stdout, stderr, return_code, role_info)\n        for issue in issues:\n\
          \            if command_id not in issue_map[issue]:\n                issue_map[issue].append(command_id)\n\
          \n        section = [\n            f'### {index}. {command_id}',\n     \
          \       f'- 返回码：{return_code}',\n        ]\n        if shell:\n        \
          \    section.append(f'- 执行命令：{shell}')\n        if issues:\n           \
          \ section.append(f\"- 失败归因：{'、'.join(issues)}\")\n        if stdout:\n \
