  type: marketplace
  value:
    marketplace_plugin_unique_identifier: bowenliang123/md_exporter:3.6.9@3f027d63e80b44d5d5a9f706871afaef37905b8f8a89a2d152dc530211a8acb1
    version: null
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables:
  - description: Windows 巡检命令库；后续新增命令直接修改这个环境变量。
    id: env_command_library_json
    name: COMMAND_LIBRARY_JSON
    selector:
    - env
    - COMMAND_LIBRARY_JSON
    value: "{\n  \"version\": \"2026-05-19\",\n  \"source\": \"Microsoft AD.docx\"\
      ,\n  \"notes\": \"将本 JSON 作为 Dify 页面中的环境变量 COMMAND_LIBRARY_JSON 的值。已移除 Export-Csv\
      \ 导出逻辑，确保 Agent 能从 stdout 捕获数据返回给大语言模型。\",\n  \"commands\": [\n    {\n     \
      \ \"id\": \"host_domain_role_probe\",\n      \"source\": \"library\",\n    \
      \  \"category\": \"active_directory\",\n      \"title\": \"主机域角色探测\",\n    \
      \  \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"$cs = Get-CimInstance Win32_ComputerSystem; [pscustomobject]@{\
      \ ComputerName = $cs.Name; Domain = $cs.Domain; PartOfDomain = $cs.PartOfDomain;\
      \ DomainRole = $cs.DomainRole; DomainRoleText = switch ($cs.DomainRole) { 0\
      \ {'StandaloneWorkstation'} 1 {'MemberWorkstation'} 2 {'StandaloneServer'} 3\
      \ {'MemberServer'} 4 {'BackupDomainController'} 5 {'PrimaryDomainController'}\
      \ default {'Unknown'} } } | Format-List\\\"\",\n      \"purpose\": \"判断当前机器是否已加入域、是否为域控制器\"\
      ,\n      \"output_hint\": \"ComputerName, Domain, PartOfDomain, DomainRole,\
      \ DomainRoleText\"\n    },\n    {\n      \"id\": \"host_os_probe\",\n      \"\
      source\": \"library\",\n      \"category\": \"server_general\",\n      \"title\"\
      : \"操作系统信息探测\",\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell\
      \ -NoProfile -ExecutionPolicy Bypass -Command \\\"$os = Get-CimInstance Win32_OperatingSystem;\
      \ [pscustomobject]@{ ComputerName = $os.CSName; Caption = $os.Caption; Version\
      \ = $os.Version; BuildNumber = $os.BuildNumber; OSArchitecture = $os.OSArchitecture\
      \ } | Format-List\\\"\",\n      \"purpose\": \"获取当前主机操作系统名称、版本、架构\",\n     \
      \ \"output_hint\": \"ComputerName, Caption, Version, BuildNumber, OSArchitecture\"\
      \n    },\n    {\n      \"id\": \"host_identity_probe\",\n      \"source\": \"\
      library\",\n      \"category\": \"server_general\",\n      \"title\": \"当前账户与管理员权限探测\"\
      ,\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile\
      \ -ExecutionPolicy Bypass -Command \\\"$id = [System.Security.Principal.WindowsIdentity]::GetCurrent();\
      \ $principal = New-Object System.Security.Principal.WindowsPrincipal($id); [pscustomobject]@{\
      \ UserName = $id.Name; IsAdministrator = $principal.IsInRole([System.Security.Principal.WindowsBuiltInRole]::Administrator)\
      \ } | Format-List\\\"\",\n      \"purpose\": \"获取当前执行账户以及是否管理员\",\n      \"\
      output_hint\": \"UserName, IsAdministrator\"\n    },\n    {\n      \"id\": \"\
      host_time_probe\",\n      \"source\": \"library\",\n      \"category\": \"server_general\"\
      ,\n      \"title\": \"当前时间与时区探测\",\n      \"risk_level\": \"low\",\n      \"\
      shell\": \"powershell -NoProfile -ExecutionPolicy Bypass -Command \\\"[pscustomobject]@{\
      \ CurrentTime = (Get-Date -Format 'yyyy-MM-dd HH:mm:ss K'); TimeZone = (Get-TimeZone).Id\
      \ } | Format-List\\\"\",\n      \"purpose\": \"获取当前主机时间和时区\",\n      \"output_hint\"\
      : \"CurrentTime, TimeZone\"\n    },\n    {\n      \"id\": \"ad_tooling_probe\"\
      ,\n      \"category\": \"active_directory\",\n      \"title\": \"AD 工具可用性探测\"\
      ,\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile\
      \ -ExecutionPolicy Bypass -Command \\\"$ad = Get-Module -ListAvailable ActiveDirectory\
      \ | Select-Object -First 1 Name, Version, Path; $rep = Get-Command repadmin\
      \ -ErrorAction SilentlyContinue; $dcd = Get-Command dcdiag -ErrorAction SilentlyContinue;\
      \ [pscustomobject]@{ ActiveDirectoryModuleInstalled = [bool]$ad; ActiveDirectoryModulePath\
      \ = if ($ad) { $ad.Path } else { $null }; RepadminAvailable = [bool]$rep; DcdiagAvailable\
      \ = [bool]$dcd } | Format-List\\\"\",\n      \"purpose\": \"检查 Active Directory\
      \ PowerShell 模块、repadmin、dcdiag 是否可用\",\n      \"output_hint\": \"ActiveDirectoryModuleInstalled,\
      \ ActiveDirectoryModulePath, RepadminAvailable, DcdiagAvailable\"\n    },\n\
      \    {\n      \"id\": \"ad_ntds_service_probe\",\n      \"category\": \"active_directory\"\
      ,\n      \"title\": \"NTDS 服务探测\",\n      \"risk_level\": \"low\",\n      \"\
      shell\": \"powershell -NoProfile -ExecutionPolicy Bypass -Command \\\"$svc =\
      \ Get-Service -Name NTDS -ErrorAction SilentlyContinue; if ($svc) { $svc | Select-Object\
      \ Name, Status, StartType, DisplayName } else { Write-Error '未发现 NTDS 服务。当前主机大概率不是域控制器。';\
      \ exit 3 }\\\"\",\n      \"purpose\": \"判断当前主机是否具备域控核心服务\",\n      \"output_hint\"\
      : \"Name, Status, StartType, DisplayName\"\n    },\n    {\n      \"id\": \"\
      ad_domain_controllers\",\n      \"category\": \"active_directory\",\n      \"\
      title\": \"域控制器基本信息\",\n      \"risk_level\": \"low\",\n      \"shell\": \"\
      powershell -NoProfile -ExecutionPolicy Bypass -Command \\\"if (Get-Module -ListAvailable\
      \ ActiveDirectory) { Import-Module ActiveDirectory; Get-ADDomainController -Filter\
      \ * | Select-Object Name, IPv4Address, OperatingSystem, Site, IsGlobalCatalog,\
      \ IsReadOnly } else { Write-Error 'AD 模块不可用。' }\\\"\",\n      \"purpose\": \"\
      列出所有域控制器及其状态\",\n      \"output_hint\": \"Name, IPv4Address, OperatingSystem,\
      \ Site, IsGlobalCatalog, IsReadOnly\"\n    },\n    {\n      \"id\": \"ad_domain_info\"\
      ,\n      \"category\": \"active_directory\",\n      \"title\": \"AD 域信息\",\n\
      \      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"if (Get-Module -ListAvailable ActiveDirectory) { Import-Module\
      \ ActiveDirectory; Get-ADDomain | Select-Object DNSRoot, DomainMode, PDCEmulator,\
      \ RIDMaster, InfrastructureMaster } else { Write-Error 'AD 模块不可用。' }\\\"\",\n\
      \      \"purpose\": \"获取域模式和核心角色信息\",\n      \"output_hint\": \"DNSRoot, DomainMode,\
      \ PDCEmulator, RIDMaster, InfrastructureMaster\"\n    },\n    {\n      \"id\"\
      : \"ad_forest_info\",\n      \"category\": \"active_directory\",\n      \"title\"\
      : \"AD 林信息\",\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell\
      \ -NoProfile -ExecutionPolicy Bypass -Command \\\"if (Get-Module -ListAvailable\
      \ ActiveDirectory) { Import-Module ActiveDirectory; Get-ADForest | Select-Object\
      \ ForestMode, RootDomain, SchemaMaster, DomainNamingMaster, GlobalCatalogs }\
      \ else { Write-Error 'AD 模块不可用。' }\\\"\",\n      \"purpose\": \"获取林模式和全局编录信息\"\
      ,\n      \"output_hint\": \"ForestMode, RootDomain, SchemaMaster, DomainNamingMaster,\
      \ GlobalCatalogs\"\n    },\n    {\n      \"id\": \"ad_fsmo_roles\",\n      \"\
      category\": \"active_directory\",\n      \"title\": \"FSMO 角色检查\",\n      \"\
      risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"if (Get-Module -ListAvailable ActiveDirectory) { Import-Module\
      \ ActiveDirectory; $f=(Get-ADForest); $d=(Get-ADDomain); [PSCustomObject]@{SchemaMaster=$f.SchemaMaster;\
      \ DomainNamingMaster=$f.DomainNamingMaster; PDCEmulator=$d.PDCEmulator; RIDMaster=$d.RIDMaster;\
      \ InfrastructureMaster=$d.InfrastructureMaster} | Format-List }\\\"\",\n   \
      \   \"purpose\": \"获取所有 FSMO 角色持有者\",\n      \"output_hint\": \"SchemaMaster,\
      \ DomainNamingMaster, PDCEmulator, RIDMaster, InfrastructureMaster\"\n    },\n\
      \    {\n      \"id\": \"ad_repadmin_summary\",\n      \"category\": \"active_directory\"\
      ,\n      \"title\": \"AD 复制摘要\",\n      \"risk_level\": \"low\",\n      \"shell\"\
      : \"powershell -NoProfile -ExecutionPolicy Bypass -Command \\\"if (Get-Command\
      \ repadmin -ErrorAction SilentlyContinue) { & repadmin /replsummary } else {\
      \ Write-Error 'repadmin 不可用。' }\\\"\",\n      \"purpose\": \"检查 AD 复制摘要\",\n\
      \      \"output_hint\": \"复制延迟、失败数量、目标 DC\"\n    },\n    {\n      \"id\": \"\
      ad_repadmin_status\",\n      \"category\": \"active_directory\",\n      \"title\"\
      : \"AD 复制状态详情\",\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell\
      \ -NoProfile -ExecutionPolicy Bypass -Command \\\"if (Get-Command repadmin -ErrorAction\
      \ SilentlyContinue) { & repadmin /showrepl * /csv } else { Write-Error 'repadmin\
      \ 不可用。' }\\\"\",\n      \"purpose\": \"检查 AD 复制状态详情\",\n      \"output_hint\"\
      : \"以 CSV 格式输出的复制状态数据\"\n    },\n    {\n      \"id\": \"ad_dcdiag_full\",\n\
      \      \"category\": \"active_directory\",\n      \"title\": \"DCDiag 全量检查\"\
      ,\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile\
      \ -ExecutionPolicy Bypass -Command \\\"if (Get-Command dcdiag -ErrorAction SilentlyContinue)\
      \ { & dcdiag /v /c /e } else { Write-Error 'dcdiag 不可用。' }\\\"\",\n      \"\
      purpose\": \"对所有域控运行完整诊断\",\n      \"output_hint\": \"各项测试结果与错误信息\"\n    },\n\
      \    {\n      \"id\": \"ad_dcdiag_dns\",\n      \"category\": \"active_directory\"\
      ,\n      \"title\": \"DCDiag DNS专项检查\",\n      \"risk_level\": \"low\",\n  \
      \    \"shell\": \"powershell -NoProfile -ExecutionPolicy Bypass -Command \\\"\
      if (Get-Command dcdiag -ErrorAction SilentlyContinue) { & dcdiag /test:dns /e\
      \ /v } else { Write-Error 'dcdiag 不可用。' }\\\"\",\n      \"purpose\": \"对所有域控运行DNS诊断\"\
      ,\n      \"output_hint\": \"DNS 测试结果\"\n    },\n    {\n      \"id\": \"ad_disabled_users\"\
      ,\n      \"category\": \"active_directory\",\n      \"title\": \"禁用用户账户\",\n\
      \      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"if (Get-Module -ListAvailable ActiveDirectory) { Import-Module\
      \ ActiveDirectory; Get-ADUser -Filter {Enabled -eq $false} -Properties LastLogonDate,\
      \ WhenCreated | Select-Object Name, SamAccountName, LastLogonDate, WhenCreated\
      \ }\\\"\",\n      \"purpose\": \"统计禁用的用户账户\",\n      \"output_hint\": \"Name,\
      \ SamAccountName, LastLogonDate, WhenCreated\"\n    },\n    {\n      \"id\"\
      : \"ad_inactive_users_90days\",\n      \"category\": \"active_directory\",\n\
      \      \"title\": \"90天未登录活跃用户\",\n      \"risk_level\": \"low\",\n      \"\
      shell\": \"powershell -NoProfile -ExecutionPolicy Bypass -Command \\\"if (Get-Module\
      \ -ListAvailable ActiveDirectory) { Import-Module ActiveDirectory; $d = (Get-Date).AddDays(-90);\
      \ Get-ADUser -Filter {LastLogonDate -lt $d -and Enabled -eq $true} -Properties\
      \ LastLogonDate | Select-Object Name, SamAccountName, LastLogonDate }\\\"\"\
      ,\n      \"purpose\": \"统计 90 天未登录的活跃用户\",\n      \"output_hint\": \"Name, SamAccountName,\
      \ LastLogonDate\"\n    },\n    {\n      \"id\": \"ad_password_never_expires\"\
      ,\n      \"category\": \"active_directory\",\n      \"title\": \"密码永不过期用户\"\
      ,\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile\
      \ -ExecutionPolicy Bypass -Command \\\"if (Get-Module -ListAvailable ActiveDirectory)\
      \ { Import-Module ActiveDirectory; Get-ADUser -Filter {PasswordNeverExpires\
      \ -eq $true -and Enabled -eq $true} | Select-Object Name, SamAccountName }\\\
      \"\",\n      \"purpose\": \"统计密码设置为永不过期的用户\",\n      \"output_hint\": \"Name,\
      \ SamAccountName\"\n    },\n    {\n      \"id\": \"ad_locked_out_users\",\n\
      \      \"category\": \"active_directory\",\n      \"title\": \"锁定用户检查\",\n \
      \     \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"if (Get-Module -ListAvailable ActiveDirectory) { Import-Module\
      \ ActiveDirectory; Search-ADAccount -LockedOut | Select-Object Name, SamAccountName,\
      \ LastLogonDate }\\\"\",\n      \"purpose\": \"检查当前被锁定的 AD 用户\",\n      \"output_hint\"\
      : \"Name, SamAccountName, LastLogonDate\"\n    },\n    {\n      \"id\": \"ad_gpo_list\"\
      ,\n      \"category\": \"active_directory\",\n      \"title\": \"组策略(GPO)列表\"\
      ,\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile\
      \ -ExecutionPolicy Bypass -Command \\\"if (Get-Command Get-GPO -ErrorAction\
      \ SilentlyContinue) { Get-GPO -All | Select-Object DisplayName, GpoStatus, CreationTime,\
      \ ModificationTime } else { Write-Error 'GroupPolicy 模块不可用。' }\\\"\",\n    \
      \  \"purpose\": \"检查所有的 GPO 列表\",\n      \"output_hint\": \"DisplayName, GpoStatus,\
      \ CreationTime, ModificationTime\"\n    },\n    {\n      \"id\": \"ad_dns_zones\"\
      ,\n      \"category\": \"active_directory\",\n      \"title\": \"DNS 区域列表\"\
      ,\n      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile\
      \ -ExecutionPolicy Bypass -Command \\\"if (Get-Command Get-DnsServerZone -ErrorAction\
      \ SilentlyContinue) { Get-DnsServerZone | Select-Object ZoneName, ZoneType,\
      \ DynamicUpdate, IsReverseLookupZone, IsDsIntegrated } else { Write-Error 'DnsServer\
      \ 模块不可用。' }\\\"\",\n      \"purpose\": \"检查 DNS 区域配置\",\n      \"output_hint\"\
      : \"ZoneName, ZoneType, DynamicUpdate, IsReverseLookupZone, IsDsIntegrated\"\
      \n    },\n    {\n      \"id\": \"exchange_server_list\",\n      \"category\"\
      : \"exchange\",\n      \"title\": \"Exchange 服务器清单\",\n      \"risk_level\"\
      : \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy Bypass\
      \ -Command \\\"if (Get-Command Get-ExchangeServer -ErrorAction SilentlyContinue)\
      \ { Get-ExchangeServer | Select-Object Name, ServerRole, Edition, AdminDisplayVersion,\
      \ Site } else { Write-Error 'Exchange 管理工具未加载或不可用。' }\\\"\",\n      \"purpose\"\
      : \"列出 Exchange 服务器基础信息\",\n      \"output_hint\": \"Name, ServerRole, Edition,\
      \ AdminDisplayVersion, Site\"\n    },\n    {\n      \"id\": \"exchange_health_report\"\
      ,\n      \"category\": \"exchange\",\n      \"title\": \"Exchange 健康报告\",\n\
      \      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"if (Get-Command Get-HealthReport -ErrorAction SilentlyContinue)\
      \ { Get-HealthReport -Server (Get-ExchangeServer).Name } else { Write-Error\
      \ 'Exchange 管理工具未加载。' }\\\"\",\n      \"purpose\": \"获取 Exchange 健康报告\",\n \
      \     \"output_hint\": \"健康状态、失败项、组件名称\"\n    },\n    {\n      \"id\": \"exchange_component_state\"\
      ,\n      \"category\": \"exchange\",\n      \"title\": \"Exchange 组件状态\",\n\
      \      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"if (Get-Command Get-ServerComponentState -ErrorAction\
      \ SilentlyContinue) { Get-ExchangeServer | ForEach-Object { Get-ServerComponentState\
      \ -Identity $_.Name | Select-Object @{N='Server';E={$_.Identity}}, Component,\
      \ State } }\\\"\",\n      \"purpose\": \"检查 Exchange 服务器组件状态\",\n      \"output_hint\"\
      : \"Server, Component, State\"\n    },\n    {\n      \"id\": \"exchange_database_status\"\
      ,\n      \"category\": \"exchange\",\n      \"title\": \"邮箱数据库状态\",\n      \"\
      risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"if (Get-Command Get-MailboxDatabase -ErrorAction SilentlyContinue)\
      \ { Get-MailboxDatabase -Status | Select-Object Name, Server, DatabaseSize,\
      \ Mounted, LastFullBackup }\\\"\",\n      \"purpose\": \"检查邮箱数据库挂载和备份状态\",\n\
      \      \"output_hint\": \"Name, Server, DatabaseSize, Mounted, LastFullBackup\"\
      \n    },\n    {\n      \"id\": \"exchange_dag_status\",\n      \"category\"\
      : \"exchange\",\n      \"title\": \"DAG 状态检查\",\n      \"risk_level\": \"low\"\
      ,\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy Bypass -Command\
      \ \\\"if (Get-Command Get-DatabaseAvailabilityGroup -ErrorAction SilentlyContinue)\
      \ { Get-DatabaseAvailabilityGroup -Status | Select-Object Name, PrimaryActiveManager,\
      \ OperationalServers, WitnessServer }\\\"\",\n      \"purpose\": \"检查数据库可用性组(DAG)配置\"\
      ,\n      \"output_hint\": \"Name, PrimaryActiveManager, OperationalServers,\
      \ WitnessServer\"\n    },\n    {\n      \"id\": \"exchange_mail_queues\",\n\
      \      \"category\": \"exchange\",\n      \"title\": \"邮件队列检查\",\n      \"risk_level\"\
      : \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy Bypass\
      \ -Command \\\"if (Get-Command Get-Queue -ErrorAction SilentlyContinue) { Get-ExchangeServer\
      \ | Where-Object { $_.ServerRole -match 'Mailbox' } | ForEach-Object { Get-Queue\
      \ -Server $_.Name | Select-Object Identity, DeliveryType, Status, MessageCount\
      \ } }\\\"\",\n      \"purpose\": \"检查 Exchange 邮箱服务器邮件队列\",\n      \"output_hint\"\
      : \"Identity, DeliveryType, Status, MessageCount\"\n    },\n    {\n      \"\
      id\": \"exchange_certificates\",\n      \"category\": \"exchange\",\n      \"\
      title\": \"Exchange 证书状态\",\n      \"risk_level\": \"low\",\n      \"shell\"\
      : \"powershell -NoProfile -ExecutionPolicy Bypass -Command \\\"if (Get-Command\
      \ Get-ExchangeCertificate -ErrorAction SilentlyContinue) { Get-ExchangeServer\
      \ | ForEach-Object { Get-ExchangeCertificate -Server $_.Name | Select-Object\
      \ Subject, Thumbprint, NotAfter, Status, Services } }\\\"\",\n      \"purpose\"\
      : \"检查所有 Exchange 证书的过期时间和绑定的服务\",\n      \"output_hint\": \"Subject, Thumbprint,\
      \ NotAfter, Status, Services\"\n    },\n    {\n      \"id\": \"srv_disk_space\"\
      ,\n      \"category\": \"server_general\",\n      \"title\": \"服务器磁盘空间检查\",\n\
      \      \"risk_level\": \"low\",\n      \"shell\": \"powershell -NoProfile -ExecutionPolicy\
      \ Bypass -Command \\\"Get-CimInstance Win32_LogicalDisk -Filter 'DriveType=3'\
      \ | Select-Object DeviceID, @{N='Size_GB';E={[math]::Round($_.Size/1GB,2)}},\
      \ @{N='FreeSpace_GB';E={[math]::Round($_.FreeSpace/1GB,2)}}, @{N='PercentFree';E={[math]::Round($_.FreeSpace/$_.Size*100,2)}}\
      \ | Format-Table -AutoSize\\\"\",\n      \"purpose\": \"检查当前主机的磁盘空间使用率\",\n\
      \      \"output_hint\": \"DeviceID, Size_GB, FreeSpace_GB, PercentFree\"\n \
      \   },\n    {\n      \"id\": \"srv_uptime\",\n      \"category\": \"server_general\"\
      ,\n      \"title\": \"服务器运行时间\",\n      \"risk_level\": \"low\",\n      \"shell\"\
      : \"powershell -NoProfile -ExecutionPolicy Bypass -Command \\\"$os = Get-CimInstance\
      \ Win32_OperatingSystem; [PSCustomObject]@{ Server = $env:COMPUTERNAME; LastBootTime\
      \ = $os.LastBootUpTime; Uptime_Days = [math]::Round(((Get-Date) - $os.LastBootUpTime).TotalDays,\
      \ 2) } | Format-List\\\"\",\n      \"purpose\": \"检查主机的系统运行时间和最近重启时间\",\n  \
      \    \"output_hint\": \"Server, LastBootTime, Uptime_Days\"\n    }\n  ]\n}"
    value_type: string
  - description: 高风险关键词；命中后进入阻断分支。
    id: env_risk_keywords
    name: RISK_KEYWORDS
    selector:
    - env
    - RISK_KEYWORDS
    value: remove|delete|stop|restart|disable|set-|new-|add-|clear|format|shutdown|reboot|rm|del
    value_type: string
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: 请输入 Windows 巡检问题。低风险只读巡检会直接执行；高风险或边界请求会进入人工介入审批。
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 全量检查
    - 今天周几
    - 服务器状态如何
    - ''
    suggested_questions_after_answer:
      enabled: true
      model:
        completion_params:
          echo: false
          frequency_penalty: 0
          max_tokens: 0
          presence_penalty: 0
          stop: []
          temperature: 0.7
          top_p: 0
        mode: chat
        name: minimax-m2.7
        provider: langgenius/minimax/minimax
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        sourceType: start
        targetType: code
      id: 1779088244107-source-build_agent_base_url-target
      selected: false
      source: '1779088244107'
      sourceHandle: source
      target: build_agent_base_url
      targetHandle: target
      type: custom
    - data:
        sourceType: agent
        targetType: code
      id: 1779159173132-source-normalize_planner_result-target
      source: '1779159173132'
      sourceHandle: source
      target: normalize_planner_result
      targetHandle: target
      type: custom
    - data:
        sourceType: agent
        targetType: code
      id: 1779172289855-source-execute_docx_policy-target
      source: '1779172289855'
      sourceHandle: source
      target: execute_docx_policy
      targetHandle: target
      type: custom
    - data:
        sourceType: tool
        targetType: answer
