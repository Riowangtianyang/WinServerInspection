          \n    lines.extend(['', '## 关键结论'])\n    for item in conclusions:\n    \
          \    lines.append(f'- {item}')\n\n    lines.extend(['', '## 下一步建议'])\n \
          \   for item in suggestions:\n        lines.append(f'- {item}')\n\n    lines.extend(['',\
          \ '## 命令明细'])\n    if command_sections:\n        lines.append('\\n\\n'.join(command_sections))\n\
          \    else:\n        lines.append('- 本次返回中没有 command_results 明细。')\n\n  \
          \  return {'summary': '\\n'.join(lines).strip()}"
