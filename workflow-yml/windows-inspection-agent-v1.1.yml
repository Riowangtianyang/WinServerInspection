          \ or '不适用'}\")\n    lines.append(f\"- 实际 library 命令数：{actual_library_count\
          \ or '不适用'}\")\n    lines.append(f\"- 缺失 library 命令：{missing_library_commands\
          \ or '不适用'}\")\n    lines.append(f\"- 回执结论：{integrity_summary or '未生成'}\"\
          )\n\n    lines.extend(['', '## 业务失败归因'])\n    categorized = False\n    for\
          \ issue_name in ['主机角色不匹配', '模块缺失', '工具缺失', '权限不足', '命令本身报错']:\n       \
          \ command_ids = issue_map.get(issue_name) or []\n        if command_ids:\n\
          \            categorized = True\n            lines.append(f\"- {issue_name}：{'、'.join(command_ids)}\"\
