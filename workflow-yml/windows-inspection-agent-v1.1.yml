          \        if domain_role_text in {'BackupDomainController', 'PrimaryDomainController'}:\n\
          \            conclusions.append(f'当前主机 {host_label} 的角色为 {domain_role_text}，属于域控制器。')\n\
          \        else:\n            domain_suffix = f'，属于域 {domain_name}' if domain_name\
