        body:
          data: '{}'
          type: json
        code: "import json\n\ndef _extract_json(text: str):\n    raw = (text or '').strip()\n\
          \    if not raw:\n        raise ValueError('planner returned empty text')\n\
          \    fence = chr(96) * 3\n    if fence in raw:\n        parts = [part.strip()\
          \ for part in raw.split(fence) if part.strip()]\n        for part in parts:\n\
          \            lowered = part.lower()\n            if lowered.startswith('json'):\n\
          \                raw = part[4:].strip()\n                break\n    if raw.lower().startswith('json'):\n\
          \        raw = raw[4:].strip()\n    start = raw.find('{')\n    end = raw.rfind('}')\n\
          \    if start == -1 or end == -1 or end < start:\n        raise ValueError('planner\
          \ output is not a JSON object')\n    payload = json.loads(raw[start:end\
          \ + 1])\n    if not isinstance(payload, dict):\n        raise ValueError('planner\
          \ output must be a JSON object')\n    return payload\n\ndef _load_command_library(command_library_json:\
          \ str):\n    raw = (command_library_json or '').strip()\n    if not raw:\n\
          \        return 'unknown', [], {}\n    library = json.loads(raw)\n    version\
          \ = str(library.get('version') or '').strip() or 'unknown'\n    commands\
          \ = library.get('commands') if isinstance(library, dict) else []\n    ordered\
          \ = []\n    lookup = {}\n    if isinstance(commands, list):\n        for\
          \ item in commands:\n            if not isinstance(item, dict):\n      \
          \          continue\n            command_id = str(item.get('id') or '').strip()\n\
          \            shell = str(item.get('shell') or item.get('command') or '').strip()\n\
          \            if command_id and shell:\n                ordered.append({'id':\
          \ command_id, 'shell': shell})\n                lookup[command_id] = shell\n\
          \    return version, ordered, lookup\n\ndef _normalize_plan_mode(payload):\n\
          \    mode = str(payload.get('plan_mode') or payload.get('inspection_mode')\
          \ or '').strip().lower()\n    return mode if mode in {'full_inspection',\
          \ 'targeted_inspection'} else 'targeted_inspection'\n\ndef _normalize_commands(commands,\
          \ lookup):\n    normalized = []\n    if not isinstance(commands, list) or\
          \ not commands:\n        raise ValueError('planner commands missing')\n\
          \    for index, item in enumerate(commands, start=1):\n        if isinstance(item,\
          \ dict):\n            command_id = str(item.get('id') or f'cmd_{index}').strip()\n\
          \            explicit_shell = str(item.get('shell') or item.get('command')\
          \ or '').strip()\n            source = str(item.get('source') or '').strip().lower()\n\
          \        else:\n            command_id = f'cmd_{index}'\n            explicit_shell\
          \ = str(item).strip()\n            source = ''\n        expected_shell =\
          \ str(lookup.get(command_id) or '').strip()\n        shell = explicit_shell\
          \ or expected_shell\n        if not shell:\n            raise ValueError(f'command\
          \ shell missing: {command_id}')\n        if source == 'library':\n     \
          \       if expected_shell and shell != expected_shell:\n               \
          \ source = 'unknown'\n        elif source != 'generated':\n            source\
          \ = 'library' if expected_shell and shell == expected_shell else 'unknown'\n\
          \        normalized.append({'id': command_id, 'shell': shell, 'source':\
          \ source})\n    return normalized\n\ndef _join_or_none(values):\n    items\
          \ = [str(item).strip() for item in values if str(item).strip()]\n    return\
          \ '、'.join(items) if items else '无'\n\ndef _build_integrity_summary(plan_mode,\
          \ expected_library_ids, actual_library_ids, generated_ids, unknown_source_ids,\
          \ total_count):\n    if plan_mode != 'full_inspection':\n        return\
          \ f'当前为定向检查，共 {total_count} 条命令，其中 library {len(actual_library_ids)} 条，generated\
          \ {len(generated_ids)} 条。'\n    missing_ids = [cid for cid in expected_library_ids\
          \ if cid not in actual_library_ids]\n    issues = []\n    if actual_library_ids\
          \ != expected_library_ids:\n        issues.append('library 命令顺序或完整性不一致')\n\
